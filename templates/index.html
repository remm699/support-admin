<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Support Admin — RAG CISP</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      color: #333;
      min-height: 100vh;
    }

    header {
      background: #1a1a2e;
      color: #fff;
      padding: 1.2rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 {
      font-size: 1.2rem;
      font-weight: 600;
    }

    #status {
      font-size: 0.85rem;
      color: #aaa;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    #status .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #888;
    }

    #status.ok .dot { background: #4ade80; }
    #status.error .dot { background: #f87171; }

    main {
      max-width: 800px;
      margin: 2rem auto;
      padding: 0 1rem;
    }

    .search-box {
      background: #fff;
      border-radius: 12px;
      padding: 1.5rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      margin-bottom: 1.5rem;
    }

    .search-box h2 {
      font-size: 0.9rem;
      color: #666;
      margin-bottom: 0.75rem;
      font-weight: 400;
    }

    form {
      display: flex;
      gap: 0.5rem;
    }

    input[type="text"] {
      flex: 1;
      padding: 0.75rem 1rem;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus {
      border-color: #1a1a2e;
    }

    button {
      padding: 0.75rem 1.5rem;
      background: #1a1a2e;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover { background: #2a2a4e; }
    button:disabled { background: #aaa; cursor: not-allowed; }

    #loading {
      text-align: center;
      padding: 2rem;
      color: #888;
      display: none;
    }

    #error {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #dc2626;
      padding: 1rem;
      border-radius: 8px;
      margin-bottom: 1rem;
      display: none;
    }

    .results-info {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 0.75rem;
    }

    .answer-box {
      background: #fff;
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      border-left: 4px solid #1a1a2e;
    }

    .answer-box h3 {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 0.75rem;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .answer-text {
      font-size: 1rem;
      line-height: 1.7;
      color: #222;
      white-space: pre-wrap;
    }

    .result {
      background: #fff;
      border-radius: 12px;
      padding: 1.25rem;
      margin-bottom: 1rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.75rem;
    }

    .result-source {
      font-size: 0.8rem;
      font-weight: 600;
      color: #1a1a2e;
      background: #f0f0f5;
      padding: 0.25rem 0.6rem;
      border-radius: 4px;
    }

    .result-score {
      font-size: 0.8rem;
      color: #888;
    }

    .result-text {
      font-size: 0.95rem;
      line-height: 1.6;
      color: #444;
      white-space: pre-wrap;
    }

    .no-results {
      text-align: center;
      padding: 3rem;
      color: #888;
    }

    .disclaimer {
      text-align: center;
      font-size: 0.8rem;
      color: #aaa;
      margin-top: 2rem;
      padding: 1rem;
    }
  </style>
</head>
<body>

<header>
  <h1>Support Admin — RAG CISP</h1>
  <div id="status">
    <span class="dot"></span>
    <span id="status-text">vérification…</span>
  </div>
</header>

<main>
  <div class="search-box">
    <h2>Posez une question sur la réglementation CISP</h2>
    <form id="search-form">
      <input type="text" id="query" name="q" placeholder="Ex: Quelles sont les conditions d'agrément d'un centre CISP ?" autocomplete="off" autofocus>
      <button type="submit" id="submit-btn">Rechercher</button>
    </form>
  </div>

  <div id="error"></div>
  <div id="loading">Recherche en cours…</div>

  <div id="results"></div>

  <p class="disclaimer">
    Réponses générées à partir de documents réglementaires wallons — à titre indicatif uniquement.
  </p>
</main>

<script>
  const statusEl    = document.getElementById('status');
  const statusText  = document.getElementById('status-text');
  const form        = document.getElementById('search-form');
  const queryInput  = document.getElementById('query');
  const submitBtn   = document.getElementById('submit-btn');
  const loadingEl   = document.getElementById('loading');
  const errorEl     = document.getElementById('error');
  const resultsEl   = document.getElementById('results');

  // Check backend status
  async function checkStatus() {
    try {
      const r = await fetch('/api/status');
      const d = await r.json();
      if (d.status === 'ok') {
        statusEl.className = 'ok';
        statusText.textContent = `${d.vectors} vectors indexés`;
      } else {
        statusEl.className = 'error';
        statusText.textContent = 'erreur';
      }
    } catch {
      statusEl.className = 'error';
      statusText.textContent = 'hors ligne';
    }
  }

  // Search
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const q = queryInput.value.trim();
    if (!q) return;

    submitBtn.disabled = true;
    loadingEl.style.display = 'block';
    errorEl.style.display = 'none';
    resultsEl.innerHTML = '';

    try {
      const resp = await fetch('/api/search', {
        method: 'POST',
        body: new URLSearchParams({ q }),
      });
      const d = await resp.json();

      loadingEl.style.display = 'none';
      submitBtn.disabled = false;

      if (d.error) {
        errorEl.textContent = d.error;
        errorEl.style.display = 'block';
        return;
      }

      if (d.results.length === 0 && !d.answer) {
        resultsEl.innerHTML = `<div class="no-results">Aucun résultat trouvé pour « ${escHtml(d.query)} ».<br>Essayez de reformuler la question.</div>`;
        return;
      }

      let html = `<p class="results-info">${d.results.length} source${d.results.length > 1 ? 's' : ''} pour « ${escHtml(d.query)} »</p>`;

      if (d.answer) {
        html += `
          <div class="answer-box">
            <h3>Réponse synthétisée</h3>
            <p class="answer-text">${escHtml(d.answer)}</p>
          </div>`;
      }

      html += `<p class="results-info" style="margin-top:1.5rem;margin-bottom:0.75rem;font-weight:600;">Sources</p>`;

      for (const r of d.results) {
        html += `
        <div class="result">
          <div class="result-header">
            <span class="result-source">${escHtml(r.source)}</span>
            <span class="result-score">score: ${r.score}</span>
          </div>
          <p class="result-text">${escHtml(r.text)}</p>
        </div>`;
      }

      resultsEl.innerHTML = html;
    } catch (err) {
      loadingEl.style.display = 'none';
      submitBtn.disabled = false;
      errorEl.textContent = 'Erreur de connexion au serveur.';
      errorEl.style.display = 'block';
    }
  });

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  checkStatus();
</script>
</body>
</html>
